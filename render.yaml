databases:
  - name: quizzer-db
    plan: free
    databaseName: quizzer
    user: quizzer

services:
  - type: web
    plan: free
    name: quizzer
    runtime: python
    buildCommand: './build.sh'
    preDeployCommand: 'uv run python manage.py migrate && uv run python manage.py seed_quiz'
    startCommand: 'uv run gunicorn quizzer.wsgi:application --bind 0.0.0.0:$PORT'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: quizzer-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: 'false'
      - key: WEB_CONCURRENCY
        value: '4'
